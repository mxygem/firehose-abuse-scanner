services:

  db:
    image: scylladb/scylla:5.4
    container_name: firehose-scylla
    ports:
      - "9042:9042"
    # Tuning: 8G + periodic commitlog + no cache achieves >1M writes/sec.
    # For pure write benchmarks add: --commitlog-sync periodic
    #   --commitlog-sync-period-in-ms 1000 --enable-cache 0
    command: --smp 4 --memory 4G --overprovisioned 1 --developer-mode 1
    volumes:
      - scylla-data:/var/lib/scylla
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cqlsh -e 'SELECT now() FROM system.local' >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - "9091:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml.tmpl:/etc/prometheus/prometheus.yml.tmpl:ro
      - prometheus_data:/prometheus
    environment:
      SCANNER_TARGET: "${SCANNER_TARGET:-host.docker.internal:9090}"
    entrypoint:
      - /bin/sh
      - -c
      - 'sed "s|__SCANNER_TARGET__|$$SCANNER_TARGET|g" /etc/prometheus/prometheus.yml.tmpl > /etc/prometheus/prometheus.yml && exec /bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --storage.tsdb.retention.time=7d'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  scylla-data:
  prometheus_data:
  grafana_data:
